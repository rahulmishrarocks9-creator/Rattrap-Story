kind = "slides"
previewPath = "/rattrap-ppt/"
title = "The Rattrap — Premium Presentation"
version = "1.0.0"
id = "artifacts/rattrap-ppt"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rattrap-ppt/" ]
localPort = 24427

[services.development]
run = "pnpm --filter @workspace/rattrap-ppt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rattrap-ppt", "run", "build" ]
publicDir = "artifacts/rattrap-ppt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24427"
BASE_PATH = "/rattrap-ppt/"
