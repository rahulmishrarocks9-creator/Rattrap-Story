name: Render Slides to 4K Images

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/rattrap-ppt/src/pages/slides/**'
      - 'scripts/render-slides.js'
      - '.github/workflows/render-slides.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-slides:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies for slides project
        working-directory: artifacts/rattrap-ppt
        run: npm ci

      - name: Install Puppeteer
        run: npm install --save-dev puppeteer

      - name: Start dev server
        working-directory: artifacts/rattrap-ppt
        run: |
          npm run dev > /tmp/dev-server.log 2>&1 &
          echo $! > /tmp/dev-server.pid
          sleep 10

      - name: Wait for dev server to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:5173 > /dev/null; then
              echo "✅ Dev server is ready"
              exit 0
            fi
            echo "⏳ Waiting for dev server... ($i/30)"
            sleep 2
          done
          echo "❌ Dev server did not start"
          cat /tmp/dev-server.log
          exit 1

      - name: Render slides to 4K images
        run: node scripts/render-slides.js
        env:
          SLIDE_URL: 'http://localhost:5173'

      - name: Stop dev server
        if: always()
        run: |
          if [ -f /tmp/dev-server.pid ]; then
            kill $(cat /tmp/dev-server.pid) 2>/dev/null || true
          fi

      - name: Check rendered images
        run: |
          if [ -d "slide-outputs" ]; then
            echo "📊 Rendered slides:"
            ls -lh slide-outputs/ | tail -n +2 | awk '{print "  " $9 " (" $5 ")"}'
            echo ""
            echo "✅ Total files: $(ls -1 slide-outputs/ | wc -l)"
          else
            echo "❌ No slide-outputs directory found"
            exit 1
          fi

      - name: Commit rendered images to repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -d "slide-outputs" ] && [ "$(ls -A slide-outputs)" ]; then
            git add slide-outputs/
            
            if ! git diff --quiet --cached; then
              git commit -m "🎬 Auto-render slides to 4K PNG images - $(date +%Y-%m-%d\ %H:%M:%S)" || true
              git push || true
              echo "✅ Committed rendered images to repository"
            else
              echo "ℹ️ No changes in slide-outputs"
            fi
          fi

      - name: Upload rendered slides as artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-slides-4k
          path: slide-outputs/
          retention-days: 30

      - name: Create workflow summary
        if: success()
        run: |
          echo "# 🎬 Slides Rendered Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Rendering Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Resolution**: 4K (3840×2160)" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Slides**: $(ls -1 slide-outputs/ 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Size**: $(du -sh slide-outputs/ 2>/dev/null | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📁 Output Location" >> $GITHUB_STEP_SUMMARY
          echo "- **Directory**: \`slide-outputs/\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Saved to Repository**: ✅ Yes" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: main" >> $GITHUB_STEP_SUMMARY
