name: Render Slides to 4K Images

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/rattrap-ppt/src/pages/slides/**'
      - 'scripts/render-slides.js'
      - '.github/workflows/render-slides.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-slides:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Verify versions
        run: |
          node --version
          pnpm --version

      - name: Install all workspace dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Run approved build scripts
        run: |
          pnpm --filter @workspace/scripts exec node node_modules/puppeteer/install.mjs || true
          pnpm rebuild esbuild || true

      - name: Install browser dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgtk-3-0 \
            libgbm1

      - name: Install Puppeteer browser
        run: pnpm --filter @workspace/scripts exec puppeteer browsers install chrome

      - name: Start Vite server
        working-directory: artifacts/rattrap-ppt
        env:
          PORT: 5173
          BASE_PATH: /
        run: |
          pnpm run dev > /tmp/dev-server.log 2>&1 &
          echo $! > /tmp/dev-server.pid

      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -fs http://localhost:5173 > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          cat /tmp/dev-server.log
          exit 1

      - name: Render slides
        env:
          SLIDE_URL: http://localhost:5173
        run: node scripts/render-slides.js

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/dev-server.pid ]; then
            kill $(cat /tmp/dev-server.pid) || true
          fi

      - name: Verify output
        run: |
          test -d slide-outputs
          test "$(find slide-outputs -type f | wc -l)" -gt 0

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rendered-slides-4k
          path: slide-outputs
